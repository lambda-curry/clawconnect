<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Task</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #e4e4e7;
      background: #18181b;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.running { background: #422006; color: #fbbf24; }
    .badge.completed { background: #052e16; color: #4ade80; }
    .badge.error { background: #450a0a; color: #f87171; }
    .badge.queued { background: #1e1b4b; color: #a78bfa; }
    .elapsed {
      font-size: 12px;
      color: #71717a;
      margin-left: auto;
    }
    .status-line {
      font-size: 12px;
      color: #71717a;
      margin-bottom: 12px;
    }
    .result-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      margin-bottom: 6px;
    }
    .result {
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.6;
    }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #fbbf2440;
      border-top-color: #fbbf24;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span class="badge queued" id="badge">queued</span>
    <span id="spinnerWrap"><span class="spinner"></span></span>
    <span class="elapsed" id="elapsed"></span>
  </div>
  <div class="status-line" id="statusLine">Waiting for response...</div>
  <div class="result-label" id="resultLabel" style="display:none">Clawdy's response</div>
  <div class="result" id="result" style="display:none"></div>

  <script>
    var badgeEl = document.getElementById('badge');
    var spinnerEl = document.getElementById('spinnerWrap');
    var elapsedEl = document.getElementById('elapsed');
    var statusLine = document.getElementById('statusLine');
    var resultLabel = document.getElementById('resultLabel');
    var resultEl = document.getElementById('result');

    var jobId = null;
    var startTime = Date.now();
    var done = false;
    var oai = window.openai || {};

    function setStatus(status) {
      badgeEl.className = 'badge ' + status;
      badgeEl.textContent = status;
      if (status === 'completed' || status === 'error') {
        spinnerEl.style.display = 'none';
        done = true;
      }
    }

    function extractData(obj) {
      if (!obj) return null;
      if (obj.structuredContent) return obj.structuredContent;
      if (obj.jobId || obj.status) return obj;
      return null;
    }

    async function showResult(summary, status) {
      done = true;
      setStatus(status === 'error' ? 'error' : 'completed');
      statusLine.textContent = status === 'error' ? 'Task failed.' : 'Task completed.';
      if (summary) {
        resultLabel.style.display = 'block';
        resultEl.style.display = 'block';
        resultEl.textContent = summary;
      }

      if (oai.setWidgetState) {
        oai.setWidgetState({ done: true, summary: summary, status: status });
      }

      if (status !== 'error' && summary) {
        try {
          if (oai.requestTargetedReply) {
            await oai.requestTargetedReply();
          }
        } catch(e) {}
        try {
          if (oai.sendFollowUpMessage) {
            await oai.sendFollowUpMessage('Clawdy finished:\n\n' + summary.slice(0, 2000));
          }
        } catch(e) {}
      }
    }

    // Elapsed timer
    setInterval(function() {
      if (done) return;
      var s = Math.round((Date.now() - startTime) / 1000);
      var m = Math.floor(s / 60);
      var sec = s % 60;
      elapsedEl.textContent = m > 0 ? m + 'm ' + sec + 's' : sec + 's';
    }, 1000);

    async function poll() {
      if (done || !jobId) return;
      try {
        var result = await oai.callTool('check_openclaw_task', { jobId: jobId });
        var data = extractData(result);
        if (!data) {
          setTimeout(poll, 3000);
          return;
        }
        if (data.status === 'running') {
          var elapsed = data.elapsedSeconds || 0;
          statusLine.textContent = 'Clawdy is working... (' + elapsed + 's)';
          poll();
        } else if (data.status === 'completed') {
          showResult(data.summary, 'completed');
        } else if (data.status === 'error') {
          showResult(data.error, 'error');
        }
      } catch (err) {
        statusLine.textContent = 'Poll error, retrying...';
        setTimeout(poll, 5000);
      }
    }

    function startFromOutput(output) {
      if (done || jobId) return;
      var data = extractData(output);
      if (data && data.jobId) {
        jobId = data.jobId;
        startTime = Date.now();
        statusLine.textContent = 'Clawdy is working...';
        setStatus('running');
        poll();
      }
    }

    if (oai.widgetState && oai.widgetState.done) {
      showResult(oai.widgetState.summary, oai.widgetState.status);
    } else {
      if (oai.toolOutput) {
        startFromOutput(oai.toolOutput);
      }
      window.addEventListener('openai:set_globals', function() {
        try { startFromOutput(window.openai.toolOutput); } catch(e) {}
      });
    }
  </script>
</body>
</html>
