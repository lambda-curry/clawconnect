<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Task</title>
  <style>
    :root {
      --page-bg: transparent;
      --text-primary: #e4e4e7;
      --text-subtle: #a1a1aa;
      --label: #71717a;

      --panel-bg: rgba(255, 255, 255, 0.04);
      --panel-bg-strong: rgba(255, 255, 255, 0.06);
      --panel-bg-emphasis: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.16);

      --mono-bg: rgba(255, 255, 255, 0.02);
      --mono-border: rgba(255, 255, 255, 0.14);

      --button-bg: rgba(255, 255, 255, 0.10);
      --button-bg-hover: rgba(255, 255, 255, 0.16);
      --button-text: #e4e4e7;
      --button-border: rgba(255, 255, 255, 0.24);

      --link: #60a5fa;
      --code-bg: rgba(255, 255, 255, 0.08);
    }

    .host-light {
      --page-bg: transparent;
      --text-primary: #0f172a;
      --text-subtle: #334155;
      --label: #64748b;

      --panel-bg: rgba(15, 23, 42, 0.05);
      --panel-bg-strong: rgba(15, 23, 42, 0.08);
      --panel-bg-emphasis: rgba(15, 23, 42, 0.10);
      --panel-border: rgba(15, 23, 42, 0.18);

      --mono-bg: rgba(15, 23, 42, 0.03);
      --mono-border: rgba(15, 23, 42, 0.15);

      --button-bg: rgba(15, 23, 42, 0.08);
      --button-bg-hover: rgba(15, 23, 42, 0.14);
      --button-text: #0f172a;
      --button-border: rgba(15, 23, 42, 0.24);

      --link: #2563eb;
      --code-bg: rgba(15, 23, 42, 0.06);
    }

    :root,
    .host-dark {
      --page-bg: transparent;
      --text-primary: #e4e4e7;
      --text-subtle: #a1a1aa;
      --label: #71717a;

      --panel-bg: rgba(255, 255, 255, 0.04);
      --panel-bg-strong: rgba(255, 255, 255, 0.06);
      --panel-bg-emphasis: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.16);

      --mono-bg: rgba(255, 255, 255, 0.02);
      --mono-border: rgba(255, 255, 255, 0.14);

      --button-bg: rgba(255, 255, 255, 0.10);
      --button-bg-hover: rgba(255, 255, 255, 0.16);
      --button-text: #e4e4e7;
      --button-border: rgba(255, 255, 255, 0.24);

      --link: #60a5fa;
      --code-bg: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      background: var(--page-bg);
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.running { background: #422006; color: #fbbf24; }
    .badge.waiting { background: #172554; color: #93c5fd; }
    .badge.completed { background: #052e16; color: #4ade80; }
    .badge.error { background: #450a0a; color: #f87171; }
    .badge.queued { background: #1e1b4b; color: #a78bfa; }
    .elapsed { font-size: 12px; color: var(--label); margin-left: auto; }
    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--label); margin-bottom: 6px;
    }
    .logs {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 10px 12px; margin-bottom: 12px; max-height: 140px; overflow-y: auto;
      font-family: "SF Mono", "Fira Code", monospace; font-size: 11px;
      color: var(--text-subtle); line-height: 1.6;
      backdrop-filter: blur(3px);
    }
    .logs .entry { white-space: pre-wrap; word-break: break-word; display: flex; gap: 8px; }
    .logs .ts { color: var(--label); flex-shrink: 0; }
    .logs .icon { flex-shrink: 0; }
    .logs .entry.lifecycle .icon { color: #a78bfa; }
    .logs .entry.tool .icon { color: #60a5fa; }
    .logs .entry.tool-result .icon { color: #4ade80; }
    .details-wrap { display: none; margin-bottom: 12px; }
    .details {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 12px;
      backdrop-filter: blur(3px);
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }
    .detail-item {
      background: var(--panel-bg-strong);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 10px;
    }
    .detail-key {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--label);
      margin-bottom: 4px;
    }
    .detail-value {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-primary);
      word-break: break-word;
    }
    .detail-value.muted { color: var(--text-subtle); }
    .detail-link {
      color: var(--link);
      text-decoration: none;
    }
    .detail-link:hover { text-decoration: underline; }
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }
    .file-chip {
      background: var(--panel-bg-emphasis);
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 6px 8px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: var(--text-subtle);
      word-break: break-all;
    }
    .result {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 12px; max-height: 400px; overflow-y: auto;
      word-break: break-word; font-size: 13px; line-height: 1.6;
      backdrop-filter: blur(3px);
    }
    .result h1, .result h2, .result h3 {
      color: var(--text-primary); margin: 12px 0 6px 0; font-size: 15px;
    }
    .result h1 { font-size: 17px; }
    .result h3 { font-size: 13px; }
    .result p { margin: 6px 0; }
    .result ul, .result ol { margin: 6px 0; padding-left: 20px; }
    .result li { margin: 2px 0; }
    .result code {
      background: var(--code-bg); padding: 1px 4px; border-radius: 3px;
      font-family: "SF Mono", "Fira Code", monospace; font-size: 12px;
      color: var(--text-primary);
    }
    .result pre {
      background: var(--mono-bg);
      border: 1px solid var(--mono-border);
      padding: 8px 10px; border-radius: 6px;
      overflow-x: auto; margin: 8px 0;
    }
    .result pre code { background: none; padding: 0; }
    .result strong { color: var(--text-primary); }
    .result a { color: var(--link); text-decoration: none; }
    .result a:hover { text-decoration: underline; }
    .result blockquote {
      border-left: 3px solid var(--panel-border); padding-left: 10px; margin: 8px 0; color: var(--text-subtle);
    }
    .actions {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px;
    }
    .action-btn {
      background: var(--button-bg);
      color: var(--button-text);
      border: 1px solid var(--button-border);
      border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .action-btn:hover { background: var(--button-bg-hover); }
    .action-btn:disabled { opacity: 0.4; cursor: default; }
    .action-btn.primary { background: #1d4ed8; border-color: #2563eb; color: #fff; }
    .action-btn.primary:hover { background: #2563eb; }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #fbbf2440; border-top-color: #fbbf24;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span class="badge queued" id="badge">queued</span>
    <span id="spinnerWrap"><span class="spinner"></span></span>
    <span class="elapsed" id="elapsed"></span>
  </div>
  <div class="section-label">Activity</div>
  <div class="logs" id="logs"></div>
  <div class="details-wrap" id="detailsWrap">
    <div class="section-label" id="detailsLabel">Outcome</div>
    <div class="details" id="details"></div>
  </div>
  <div class="section-label" id="resultLabel" style="display:none">Clawdy's response</div>
  <div class="result" id="result" style="display:none"></div>
  <div class="actions" id="actions" style="display:none"></div>

  <script>
    var badgeEl = document.getElementById('badge');
    var spinnerEl = document.getElementById('spinnerWrap');
    var elapsedEl = document.getElementById('elapsed');
    var logsEl = document.getElementById('logs');
    var detailsWrapEl = document.getElementById('detailsWrap');
    var detailsLabelEl = document.getElementById('detailsLabel');
    var detailsEl = document.getElementById('details');
    var resultLabel = document.getElementById('resultLabel');
    var resultEl = document.getElementById('result');
    var actionsEl = document.getElementById('actions');

    var jobId = null;
    var sessionKey = null;
    var startTime = Date.now();
    var done = false;
    var seenLogCount = 0;
    var lastData = null;
    var oai = window.openai || {};

    var ICONS = { lifecycle: '▶', tool: '⚒', 'tool-result': '✔' };
    var STORAGE_KEY = 'openclaw-status-widget:v2';
    var TERMINAL_WIDGET_STATES = { waiting: true, completed: true, error: true };

    function renderMarkdown(text) {
      var html = escapeHtml(text);
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
        return '<pre><code>' + code.trim() + '</code></pre>';
      });
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br>');
      return '<p>' + html + '</p>';
    }

    function escapeHtml(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function normalizeTheme(value) {
      if (!value) return null;
      var lower = String(value).toLowerCase();
      if (lower.indexOf('light') !== -1) return 'light';
      if (lower.indexOf('dark') !== -1) return 'dark';
      return null;
    }

    function detectHostTheme() {
      var theme = oai && oai.theme;
      if (!theme) return null;
      if (typeof theme === 'string') return normalizeTheme(theme);
      if (theme.dark === false) return 'light';
      if (theme.dark === true) return 'dark';
      return normalizeTheme(theme.mode || theme.theme || theme.colorMode || theme.name);
    }

    function applyTheme(themeHint) {
      var theme = themeHint || detectHostTheme();
      if (!theme && window.matchMedia) {
        theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      if (theme === 'light') {
        document.body.classList.remove('host-dark');
        document.body.classList.add('host-light');
      } else {
        document.body.classList.remove('host-light');
        document.body.classList.add('host-dark');
      }
    }

    function setCompletionHandoffState(data, sent, pending) {
      if (!data) return;
      data.completionHandoffSent = !!sent;
      data.completionHandoffPending = !!(pending && !sent);
    }

    function sendFollowUpMessageSafely(payload) {
      if (!oai.sendFollowUpMessage) return Promise.resolve(false);
      try {
        return Promise.resolve(oai.sendFollowUpMessage(payload)).then(function() {
          return true;
        }).catch(function() {
          return false;
        });
      } catch (directErr) {
        try {
          return Promise.resolve(oai.sendFollowUpMessage(typeof payload === 'string' ? payload : payload && payload.prompt)).then(function() {
            return true;
          }).catch(function() {
            return false;
          });
        } catch (fallbackErr) {
          return Promise.resolve(false);
        }
      }
    }

    function persistCompletionHandoff(data, sent, pending) {
      setCompletionHandoffState(data, sent, pending);
      persistRunState(data);
    }

    async function ensureCompletionHandoff(data, options) {
      options = options || {};
      if (!data || !isTerminalData(data) || data.completionHandoffSent) return false;

      var directive = options.directive || buildDirective(data);
      var sent = await sendFollowUpMessageSafely({ prompt: directive, scrollToBottom: !options.keepSilent });
      if (!sent) {
        sent = await sendFollowUpMessageSafely(directive);
      }

      if (sent) {
        persistCompletionHandoff(data, true, false);
      } else {
        persistCompletionHandoff(data, false, true);
      }

      return sent;
    }

    async function replayPendingCompletionHandoff() {
      if (!lastData || !isTerminalData(lastData)) return;
      if (lastData.completionHandoffSent || !lastData.completionHandoffPending) return;

      await ensureCompletionHandoff(lastData, { keepSilent: false });
    }

    function resetUi() {
      logsEl.innerHTML = '';
      detailsWrapEl.style.display = 'none';
      detailsLabelEl.textContent = 'Outcome';
      detailsEl.innerHTML = '';
      resultLabel.style.display = 'none';
      resultLabel.textContent = "Clawdy's response";
      resultEl.style.display = 'none';
      resultEl.innerHTML = '';
      actionsEl.style.display = 'none';
      actionsEl.innerHTML = '';
      seenLogCount = 0;
      done = false;
      setStatus('queued');
      elapsedEl.textContent = '';
    }

    function addLogEntry(entry) {
      var el = document.createElement('div');
      el.className = 'entry ' + entry.type;
      var elapsed = Math.round((entry.ts - startTime) / 1000);
      el.innerHTML = '<span class="ts">' + elapsed + 's</span>'
        + '<span class="icon">' + (ICONS[entry.type] || '•') + '</span>'
        + '<span>' + escapeHtml(entry.text) + '</span>';
      logsEl.appendChild(el);
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function renderLogs(logs) {
      if (!logs || logs.length <= seenLogCount) return;
      for (var i = seenLogCount; i < logs.length; i++) addLogEntry(logs[i]);
      seenLogCount = logs.length;
    }

    function setStatus(status) {
      badgeEl.className = 'badge ' + status;
      badgeEl.textContent = status;
      if (isTerminalWidgetState(status)) {
        spinnerEl.style.display = 'none';
        done = true;
      } else {
        spinnerEl.style.display = 'inline-block';
        done = false;
      }
    }

    function extractData(obj) {
      if (!obj) return null;
      if (obj.structuredContent) return obj.structuredContent;
      if (obj.jobId || obj.status) return obj;
      return null;
    }

    function isTerminalWidgetState(state) {
      return !!TERMINAL_WIDGET_STATES[state];
    }

    function getWidgetStatus(data) {
      if (data && data.widgetStatus && data.widgetStatus.state) return data.widgetStatus.state;
      var details = getDetails(data);
      if (data.status === 'error') return 'error';
      if (details.needsHumanDecision) return 'waiting';
      if (data.status === 'completed') return 'completed';
      return 'running';
    }

    function isTerminalData(data) {
      return isTerminalWidgetState(getWidgetStatus(data));
    }

    function getDetails(data) {
      if (data && data.details) return data.details;
      var artifacts = (data && data.artifacts) || {};
      var continuation = data && data.continuationState;
      return {
        filesChangedCount: (artifacts.filesChanged || []).length,
        filesChanged: artifacts.filesChanged || [],
        branchName: artifacts.branchName,
        commitSha: artifacts.commitSha,
        prUrl: artifacts.prUrl,
        needsHumanDecision: !!artifacts.needsHumanDecision,
        recommendedNextStep: continuation && continuation.recommendedNextStep,
      };
    }

    function buildStoredData(data) {
      if (!data) return null;
      var widgetStatus = data.widgetStatus && data.widgetStatus.state
        ? data.widgetStatus
        : { version: 1, state: getWidgetStatus(data) };
      return {
        version: 2,
        jobId: data.jobId || jobId,
        sessionKey: data.sessionKey || sessionKey,
        startedAt: data.startedAt || startTime,
        status: data.status || (isTerminalWidgetState(widgetStatus.state) ? 'completed' : 'running'),
        widgetStatus: widgetStatus,
        details: getDetails(data),
        summary: data.summary,
        error: data.error,
        errorInfo: data.errorInfo,
        artifacts: data.artifacts,
        continuationState: data.continuationState,
        completionHandoffSent: !!data.completionHandoffSent,
        completionHandoffPending: !!data.completionHandoffPending,
        logs: Array.isArray(data.logs) ? data.logs.slice(-100) : ((lastData && lastData.logs) || []),
      };
    }

    function persistRunState(data) {
      var snapshot = buildStoredData(data);
      if (!snapshot || !snapshot.jobId) return null;
      lastData = snapshot;

      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
      } catch (e) {}

      try {
        if (oai.setWidgetState) {
          oai.setWidgetState({
            runState: snapshot,
            done: isTerminalData(snapshot),
            completionHandoffSent: snapshot.completionHandoffSent,
            completionHandoffPending: snapshot.completionHandoffPending,
            jobId: snapshot.jobId,
            sessionKey: snapshot.sessionKey,
            startedAt: snapshot.startedAt,
            status: snapshot.status,
            widgetState: getWidgetStatus(snapshot),
            summary: snapshot.status === 'error' ? snapshot.error : snapshot.summary,
            details: snapshot.details,
            logs: snapshot.logs,
          });
        }
      } catch (e) {}

      return snapshot;
    }

    function loadStoredData() {
      try {
        var raw = window.localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        var parsed = JSON.parse(raw);
        return parsed && parsed.jobId ? parsed : null;
      } catch (e) {
        return null;
      }
    }

    function widgetStateToData(widgetState) {
      if (!widgetState) return null;
      if (widgetState.runState && widgetState.runState.jobId) return widgetState.runState;
      if (!(widgetState.jobId || widgetState.summary || widgetState.status || widgetState.details)) return null;
      return {
        version: 2,
        jobId: widgetState.jobId,
        sessionKey: widgetState.sessionKey,
        startedAt: widgetState.startedAt,
        status: widgetState.status || (widgetState.done ? 'completed' : 'running'),
        widgetStatus: { version: 1, state: widgetState.widgetState || (widgetState.done ? 'completed' : 'running') },
        details: widgetState.details,
        summary: widgetState.status === 'error' ? undefined : widgetState.summary,
        error: widgetState.status === 'error' ? widgetState.summary : undefined,
        errorInfo: widgetState.errorInfo,
        artifacts: widgetState.artifacts,
        continuationState: widgetState.continuationState,
        completionHandoffSent: !!widgetState.completionHandoffSent,
        completionHandoffPending: !!widgetState.completionHandoffPending,
        logs: widgetState.logs || [],
      };
    }

    function mergeWithSavedData(data, saved) {
      if (!data || !saved || saved.jobId !== data.jobId) return data;
      return {
        version: 2,
        jobId: data.jobId,
        sessionKey: data.sessionKey || saved.sessionKey,
        startedAt: data.startedAt || saved.startedAt,
        status: data.status || saved.status,
        widgetStatus: data.widgetStatus || saved.widgetStatus,
        details: data.details || saved.details,
        summary: data.summary || saved.summary,
        error: data.error || saved.error,
        errorInfo: data.errorInfo || saved.errorInfo,
        artifacts: data.artifacts || saved.artifacts,
        logs: data.logs || saved.logs || [],
        continuationState: data.continuationState || saved.continuationState,
        completionHandoffSent: !!(data.completionHandoffSent || saved.completionHandoffSent),
        completionHandoffPending: !!(data.completionHandoffPending || saved.completionHandoffPending),
      };
    }

    function renderDetails(data) {
      var details = getDetails(data);
      var hasAny = !!(
        details.filesChangedCount ||
        details.branchName ||
        details.commitSha ||
        details.prUrl ||
        details.needsHumanDecision ||
        details.recommendedNextStep
      );

      if (!hasAny) {
        detailsWrapEl.style.display = 'none';
        detailsEl.innerHTML = '';
        return;
      }

      detailsWrapEl.style.display = 'block';
      detailsLabelEl.textContent = getWidgetStatus(data) === 'waiting' ? 'Waiting on you' : 'Outcome';

      var blocks = [];
      blocks.push('<div class="detail-grid">');

      if (details.prUrl) {
        blocks.push('<div class="detail-item"><div class="detail-key">Pull request</div><div class="detail-value"><a class="detail-link" href="' + escapeHtml(details.prUrl) + '" target="_blank">' + escapeHtml(details.prUrl) + '</a></div></div>');
      }
      if (details.branchName) {
        blocks.push('<div class="detail-item"><div class="detail-key">Branch</div><div class="detail-value">' + escapeHtml(details.branchName) + '</div></div>');
      }
      if (details.commitSha) {
        blocks.push('<div class="detail-item"><div class="detail-key">Commit</div><div class="detail-value">' + escapeHtml(details.commitSha) + '</div></div>');
      }
      if (details.filesChangedCount) {
        blocks.push('<div class="detail-item"><div class="detail-key">Files changed</div><div class="detail-value">' + details.filesChangedCount + '</div></div>');
      }
      if (details.needsHumanDecision) {
        blocks.push('<div class="detail-item"><div class="detail-key">Needs human input</div><div class="detail-value muted">Clawdy is waiting for a decision before continuing.</div></div>');
      }
      if (details.recommendedNextStep) {
        blocks.push('<div class="detail-item"><div class="detail-key">Recommended next step</div><div class="detail-value muted">' + escapeHtml(details.recommendedNextStep) + '</div></div>');
      }

      blocks.push('</div>');

      if (details.filesChangedCount) {
        var maxFiles = 8;
        blocks.push('<div class="detail-key">Changed files</div>');
        blocks.push('<div class="file-list">');
        for (var i = 0; i < Math.min(details.filesChanged.length, maxFiles); i++) {
          blocks.push('<div class="file-chip">' + escapeHtml(details.filesChanged[i]) + '</div>');
        }
        if (details.filesChanged.length > maxFiles) {
          blocks.push('<div class="file-chip">+' + (details.filesChanged.length - maxFiles) + ' more</div>');
        }
        blocks.push('</div>');
      }

      detailsEl.innerHTML = blocks.join('');
    }

    function makeFollowUpAction(label, msg, primary) {
      return { kind: 'message', label: label, msg: msg, primary: !!primary };
    }

    function makeLinkAction(label, href) {
      return { kind: 'link', label: label, href: href };
    }

    function makeResumeSessionAction(sk, primary) {
      return makeFollowUpAction('Resume previous session', 'Continue the previous OpenClaw session using sessionKey: ' + sk, primary);
    }

    function makeStartFreshAction(sk) {
      return makeFollowUpAction('Start new task', 'Start a new OpenClaw task for a separate request. Do not reuse the previous sessionKey: ' + sk + '.', false);
    }

    function buildDirective(data) {
      var details = getDetails(data);
      var status = getWidgetStatus(data);

      if (status === 'error') {
        var ei = data.errorInfo;
        if (ei && ei.category === 'timeout') {
          return 'Clawdy timed out. Explain that the run likely needs to be resumed or retried with a smaller scope, and suggest continuing with the same sessionKey.';
        }
        if (ei) return 'Clawdy encountered a ' + ei.category + ' error. ' + ei.suggestedRecovery + ' Explain what happened and suggest how to fix it.';
        return 'Clawdy encountered an error. Explain what went wrong and suggest recovery steps.';
      }
      if (status === 'waiting') {
        return 'Clawdy is waiting on a human decision. Summarize the decision needed, list the options if they are present, and point the user to the recommended next step.';
      }
      if (details.prUrl) return 'Clawdy created a PR at ' + details.prUrl + '. Summarize the PR and suggest reviewing it next.';
      if (details.filesChangedCount > 0) return 'Clawdy modified ' + details.filesChangedCount + ' file(s). Summarize the changes and suggest the next step.';
      return 'Clawdy completed the task. Summarize the result and propose next steps.';
    }

    function renderActions(data) {
      actionsEl.style.display = 'flex';
      actionsEl.innerHTML = '';
      var details = getDetails(data);
      var status = getWidgetStatus(data);
      var sk = data.sessionKey || sessionKey;
      var buttons = [];

      if (status === 'error') {
        buttons.push(makeResumeSessionAction(sk, true));
        buttons.push(makeStartFreshAction(sk));
        buttons.push(makeFollowUpAction('Explain error', 'Explain in detail what went wrong and why.'));
      } else if (details.prUrl) {
        buttons.push(makeFollowUpAction('Review PR', 'Review the PR at ' + details.prUrl + ' and summarize the important changes.', true));
        buttons.push(makeResumeSessionAction(sk, false));
        buttons.push(makeStartFreshAction(sk));
        buttons.push(makeLinkAction('Open PR', details.prUrl));
      } else if (status === 'waiting' || details.needsHumanDecision) {
        buttons.push(makeFollowUpAction('Help me decide', 'Clawdy is waiting on a human decision. Summarize the decision to make, the options, and the recommended next step.', true));
        buttons.push(makeResumeSessionAction(sk, false));
        buttons.push(makeStartFreshAction(sk));
      } else if (details.filesChangedCount > 0) {
        buttons.push(makeFollowUpAction('Summarize changes', 'Summarize the code changes Clawdy made.', true));
        buttons.push(makeResumeSessionAction(sk, false));
        buttons.push(makeFollowUpAction('Create PR', 'Ask Clawdy to create a PR for these changes using sessionKey: ' + sk));
        buttons.push(makeStartFreshAction(sk));
      } else {
        buttons.push(makeFollowUpAction('Explain result', 'Explain the result in more detail.', true));
        buttons.push(makeResumeSessionAction(sk, false));
        buttons.push(makeStartFreshAction(sk));
      }

      buttons.forEach(function(b) {
        var btn = document.createElement('button');
        btn.className = 'action-btn' + (b.primary ? ' primary' : '');
        btn.textContent = b.label;
        btn.onclick = function() {
          btn.disabled = true;
          if (b.kind === 'link') {
            window.open(b.href, '_blank');
            btn.disabled = false;
            return;
          }
          if (oai.sendFollowUpMessage) oai.sendFollowUpMessage(b.msg);
        };
        actionsEl.appendChild(btn);
      });
    }

    async function showResult(data, options) {
      options = options || {};
      done = true;
      var displayStatus = getWidgetStatus(data);
      setStatus(displayStatus);
      if (data.logs) renderLogs(data.logs);
      renderDetails(data);

      var display = data.status === 'error' ? (data.error || 'Unknown error') : (data.summary || '');
      if (display) {
        resultLabel.style.display = 'block';
        resultLabel.textContent = displayStatus === 'waiting'
          ? 'Clawdy is waiting on you'
          : data.status === 'error'
            ? 'Error'
            : "Clawdy's response";
        resultEl.style.display = 'block';
        resultEl.innerHTML = renderMarkdown(display);
      }

      renderActions(data);

      if (options.persist !== false) {
        persistRunState(data);
      }

      if (options.announce === false) return;

      var directive = buildDirective(data);
      var canSend = !data.completionHandoffSent;
      if (canSend) {
        try {
          await ensureCompletionHandoff(data, { directive: directive });
        } catch (err) {
          syncCompletionHandoffState(data, false, true);
          persistRunState(data);
        }
      }
    }

    function attachToResolvedJob(data) {
      if (!data) return;
      var nextJobId = data.jobId || jobId;
      if (nextJobId !== jobId) {
        resetUi();
      }
      jobId = nextJobId;
      sessionKey = data.sessionKey || sessionKey || null;
      startTime = data.startedAt || startTime || Date.now();
      lastData = data;
    }

    function initializeFromData(data, options) {
      if (!data || !data.jobId) return false;
      options = options || {};
      resetUi();
      attachToResolvedJob(data);
      if (data.logs) renderLogs(data.logs);

      if (isTerminalData(data)) {
        showResult(data, {
          announce: options.announce,
          persist: options.persist,
        });
      } else {
        setStatus(getWidgetStatus(data));
        renderDetails(data);
        if (options.persist !== false) persistRunState(data);
        if (options.poll !== false) poll();
      }

      return true;
    }

    setInterval(function() {
      if (done) return;
      var s = Math.round((Date.now() - startTime) / 1000);
      var m = Math.floor(s / 60);
      var sec = s % 60;
      elapsedEl.textContent = m > 0 ? m + 'm ' + sec + 's' : sec + 's';
    }, 1000);

    async function poll() {
      if (done || !jobId) return;
      try {
        var result = await oai.callTool('check_openclaw_task', {
          jobId: jobId,
          sessionKey: sessionKey,
          knownLogCount: seenLogCount
        });
        var data = extractData(result);
        if (!data) {
          setTimeout(poll, 3000);
          return;
        }

        attachToResolvedJob(data);
        if (data.logs) renderLogs(data.logs);

        if (data.status === 'running') {
          data.jobId = data.jobId || jobId;
          data.sessionKey = data.sessionKey || sessionKey;
          data.startedAt = data.startedAt || startTime;
          setStatus(getWidgetStatus(data));
          renderDetails(data);
          persistRunState(data);
          poll();
        } else {
          showResult(data);
        }
      } catch (err) {
        setTimeout(poll, 5000);
      }
    }

    function startFromToolOutput(output) {
      var data = extractData(output);
      if (!data || !data.jobId) return false;
      var saved = loadStoredData();
      var merged = mergeWithSavedData(data, saved);
      var shouldAnnounce = !merged.completionHandoffSent;
      return initializeFromData(merged, { announce: shouldAnnounce && isTerminalData(merged) });
    }

    function restoreSavedRun() {
      var saved = loadStoredData();
      if (!saved || !saved.jobId) return false;
      var shouldAnnounce = !saved.completionHandoffSent && isTerminalData(saved);
      return initializeFromData(saved, { announce: shouldAnnounce });
    }

    function restoreWidgetRun() {
      var data = widgetStateToData(oai.widgetState);
      if (!data || !data.jobId) return false;
      var shouldAnnounce = !data.completionHandoffSent && isTerminalData(data);
      return initializeFromData(data, { announce: shouldAnnounce });
    }

    function bootstrap() {
      oai = window.openai || oai;
      applyTheme();

      if (startFromToolOutput(oai.toolOutput)) return;
      if (restoreSavedRun()) return;
      restoreWidgetRun();
    }

    bootstrap();

    window.addEventListener('visibilitychange', function() {
      if (!document.hidden) {
        replayPendingCompletionHandoff();
      }
    });

    window.addEventListener('openai:set_globals', function() {
      oai = window.openai || oai;
      applyTheme();
      var data = extractData(oai.toolOutput);
      if (!data || !data.jobId) return;
      if (data.jobId === jobId) return;
      startFromToolOutput(oai.toolOutput);
    });
  </script>
</body>
</html>
