<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Task</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #e4e4e7;
      background: #18181b;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.running { background: #422006; color: #fbbf24; }
    .badge.completed { background: #052e16; color: #4ade80; }
    .badge.error { background: #450a0a; color: #f87171; }
    .badge.queued { background: #1e1b4b; color: #a78bfa; }
    .elapsed { font-size: 12px; color: #71717a; margin-left: auto; }
    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #71717a; margin-bottom: 6px;
    }
    .logs {
      background: #09090b; border: 1px solid #27272a; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 12px; max-height: 140px; overflow-y: auto;
      font-family: "SF Mono", "Fira Code", monospace; font-size: 11px;
      color: #a1a1aa; line-height: 1.6;
    }
    .logs .entry { white-space: pre-wrap; word-break: break-word; display: flex; gap: 8px; }
    .logs .ts { color: #52525b; flex-shrink: 0; }
    .logs .icon { flex-shrink: 0; }
    .logs .entry.lifecycle .icon { color: #a78bfa; }
    .logs .entry.tool .icon { color: #60a5fa; }
    .logs .entry.tool-result .icon { color: #4ade80; }
    .result {
      background: #09090b; border: 1px solid #27272a; border-radius: 8px;
      padding: 12px; max-height: 400px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.6;
    }
    .actions {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px;
    }
    .action-btn {
      background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46;
      border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .action-btn:hover { background: #3f3f46; }
    .action-btn:disabled { opacity: 0.4; cursor: default; }
    .action-btn.primary { background: #1d4ed8; border-color: #2563eb; }
    .action-btn.primary:hover { background: #2563eb; }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #fbbf2440; border-top-color: #fbbf24;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span class="badge queued" id="badge">queued</span>
    <span id="spinnerWrap"><span class="spinner"></span></span>
    <span class="elapsed" id="elapsed"></span>
  </div>
  <div class="section-label">Activity</div>
  <div class="logs" id="logs"></div>
  <div class="section-label" id="resultLabel" style="display:none">Clawdy's response</div>
  <div class="result" id="result" style="display:none"></div>
  <div class="actions" id="actions" style="display:none"></div>

  <script>
    var badgeEl = document.getElementById('badge');
    var spinnerEl = document.getElementById('spinnerWrap');
    var elapsedEl = document.getElementById('elapsed');
    var logsEl = document.getElementById('logs');
    var resultLabel = document.getElementById('resultLabel');
    var resultEl = document.getElementById('result');
    var actionsEl = document.getElementById('actions');

    var jobId = null;
    var sessionKey = null;
    var startTime = Date.now();
    var done = false;
    var seenLogCount = 0;
    var lastData = null;
    var oai = window.openai || {};

    var ICONS = { lifecycle: '\u25B6', tool: '\u2692', 'tool-result': '\u2714' };

    function escapeHtml(s) {
      var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
    }

    function addLogEntry(entry) {
      var el = document.createElement('div');
      el.className = 'entry ' + entry.type;
      var elapsed = Math.round((entry.ts - startTime) / 1000);
      el.innerHTML = '<span class="ts">' + elapsed + 's</span>'
        + '<span class="icon">' + (ICONS[entry.type] || '\u2022') + '</span>'
        + '<span>' + escapeHtml(entry.text) + '</span>';
      logsEl.appendChild(el);
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function renderLogs(logs) {
      if (!logs || logs.length <= seenLogCount) return;
      for (var i = seenLogCount; i < logs.length; i++) addLogEntry(logs[i]);
      seenLogCount = logs.length;
    }

    function setStatus(status) {
      badgeEl.className = 'badge ' + status;
      badgeEl.textContent = status;
      if (status === 'completed' || status === 'error') {
        spinnerEl.style.display = 'none';
        done = true;
      }
    }

    function extractData(obj) {
      if (!obj) return null;
      if (obj.structuredContent) return obj.structuredContent;
      if (obj.jobId || obj.status) return obj;
      return null;
    }

    // Build a directive message for ChatGPT based on outcome
    function buildDirective(data) {
      if (data.status === 'error') {
        var ei = data.errorInfo;
        if (ei) return 'Clawdy encountered a ' + ei.category + ' error. ' + ei.suggestedRecovery + ' Explain what happened and suggest how to fix it.';
        return 'Clawdy encountered an error. Explain what went wrong and suggest recovery steps.';
      }
      var a = data.artifacts || {};
      if (a.prUrl) return 'Clawdy created a PR at ' + a.prUrl + '. Summarize the changes and ask if the user wants to review or merge.';
      if (a.needsHumanDecision) return 'Clawdy needs a decision from the user. Present the options clearly.';
      if ((a.filesChanged || []).length > 0) return 'Clawdy modified ' + a.filesChanged.length + ' file(s). Summarize what changed and propose next steps.';
      return 'Clawdy completed the task. Summarize the result and propose next steps.';
    }

    // Render action buttons based on outcome
    function renderActions(data) {
      actionsEl.style.display = 'flex';
      actionsEl.innerHTML = '';
      var a = data.artifacts || {};
      var sk = data.sessionKey || sessionKey;

      var buttons = [];
      if (data.status === 'error') {
        buttons.push({ label: 'Retry', msg: 'Retry the failed task using sessionKey: ' + sk, primary: true });
        buttons.push({ label: 'Explain error', msg: 'Explain in detail what went wrong and why.' });
      } else {
        buttons.push({ label: 'Continue', msg: 'Continue working on this using sessionKey: ' + sk, primary: true });
        buttons.push({ label: 'Explain changes', msg: 'Explain the changes Clawdy made in detail.' });
        if (!a.prUrl && (a.filesChanged || []).length > 0) {
          buttons.push({ label: 'Create PR', msg: 'Ask Clawdy to create a PR for these changes using sessionKey: ' + sk });
        }
      }

      buttons.forEach(function(b) {
        var btn = document.createElement('button');
        btn.className = 'action-btn' + (b.primary ? ' primary' : '');
        btn.textContent = b.label;
        btn.onclick = function() {
          btn.disabled = true;
          if (oai.sendFollowUpMessage) oai.sendFollowUpMessage(b.msg);
        };
        actionsEl.appendChild(btn);
      });
    }

    async function showResult(data) {
      done = true;
      var status = data.status;
      setStatus(status === 'error' ? 'error' : 'completed');
      if (data.logs) renderLogs(data.logs);

      var display = status === 'error' ? (data.error || 'Unknown error') : (data.summary || '');
      if (display) {
        resultLabel.style.display = 'block';
        resultLabel.textContent = status === 'error' ? 'Error' : "Clawdy's response";
        resultEl.style.display = 'block';
        resultEl.textContent = display;
      }

      renderActions(data);

      if (oai.setWidgetState) {
        oai.setWidgetState({ done: true, summary: display, status: status });
      }

      // Send directive to wake up ChatGPT
      var directive = buildDirective(data);
      try { if (oai.requestTargetedReply) await oai.requestTargetedReply(); } catch(e) {}
      try { if (oai.sendFollowUpMessage) await oai.sendFollowUpMessage(directive); } catch(e) {}
    }

    // Elapsed timer
    setInterval(function() {
      if (done) return;
      var s = Math.round((Date.now() - startTime) / 1000);
      var m = Math.floor(s / 60);
      var sec = s % 60;
      elapsedEl.textContent = m > 0 ? m + 'm ' + sec + 's' : sec + 's';
    }, 1000);

    async function poll() {
      if (done || !jobId) return;
      try {
        var result = await oai.callTool('check_openclaw_task', { jobId: jobId });
        var data = extractData(result);
        if (!data) { setTimeout(poll, 3000); return; }
        if (data.logs) renderLogs(data.logs);

        if (data.status === 'running') {
          poll();
        } else {
          lastData = data;
          showResult(data);
        }
      } catch (err) {
        setTimeout(poll, 5000);
      }
    }

    function startFromOutput(output) {
      if (done || jobId) return;
      var data = extractData(output);
      if (data && data.jobId) {
        jobId = data.jobId;
        sessionKey = data.sessionKey;
        startTime = Date.now();
        setStatus('running');
        poll();
      }
    }

    if (oai.widgetState && oai.widgetState.done) {
      showResult({ status: oai.widgetState.status, summary: oai.widgetState.summary });
    } else {
      if (oai.toolOutput) startFromOutput(oai.toolOutput);
      window.addEventListener('openai:set_globals', function() {
        try { startFromOutput(window.openai.toolOutput); } catch(e) {}
      });
    }
  </script>
</body>
</html>
