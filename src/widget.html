<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Task</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #e4e4e7;
      background: #18181b;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.running { background: #422006; color: #fbbf24; }
    .badge.completed { background: #052e16; color: #4ade80; }
    .badge.error { background: #450a0a; color: #f87171; }
    .badge.queued { background: #1e1b4b; color: #a78bfa; }
    .elapsed {
      font-size: 12px;
      color: #71717a;
      margin-left: auto;
    }
    .logs {
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      max-height: 120px;
      overflow-y: auto;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      color: #a1a1aa;
      line-height: 1.5;
    }
    .logs .entry { white-space: pre-wrap; word-break: break-word; }
    .logs .entry.info { color: #a1a1aa; }
    .logs .entry.done { color: #4ade80; }
    .logs .entry.err { color: #f87171; }
    .result {
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.6;
    }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #fbbf2440;
      border-top-color: #fbbf24;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span class="badge queued" id="badge">queued</span>
    <span id="spinnerWrap"><span class="spinner"></span></span>
    <span class="elapsed" id="elapsed"></span>
  </div>
  <div class="logs" id="logs"></div>
  <div class="result" id="result" style="display:none"></div>

  <script>
    var badgeEl = document.getElementById('badge');
    var spinnerEl = document.getElementById('spinnerWrap');
    var elapsedEl = document.getElementById('elapsed');
    var logsEl = document.getElementById('logs');
    var resultEl = document.getElementById('result');

    var jobId = null;
    var sessionKey = null;
    var startTime = Date.now();
    var done = false;

    function addLog(text, cls) {
      var el = document.createElement('div');
      el.className = 'entry ' + (cls || 'info');
      el.textContent = text;
      logsEl.appendChild(el);
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function setStatus(status) {
      badgeEl.className = 'badge ' + status;
      badgeEl.textContent = status;
      if (status === 'completed' || status === 'error') {
        spinnerEl.style.display = 'none';
        done = true;
      }
    }

    function showResult(summary, status) {
      done = true;
      setStatus(status === 'error' ? 'error' : 'completed');
      if (summary) {
        resultEl.style.display = 'block';
        resultEl.textContent = summary;
      }
      addLog(status === 'error' ? 'Task failed.' : 'Task completed.', status === 'error' ? 'err' : 'done');

      // Persist widget state
      if (window.openai && window.openai.setWidgetState) {
        window.openai.setWidgetState({ done: true, summary: summary, status: status });
      }

      // Re-awaken ChatGPT with the result
      if (status !== 'error' && summary) {
        window.parent.postMessage({
          jsonrpc: '2.0',
          method: 'ui/message',
          params: {
            role: 'user',
            content: [{ type: 'text', text: 'Clawdy finished the task. Here is the result:\n\n' + summary }]
          }
        }, '*');
      }
    }

    // Elapsed timer
    setInterval(function() {
      if (done) return;
      var s = Math.round((Date.now() - startTime) / 1000);
      var m = Math.floor(s / 60);
      var sec = s % 60;
      elapsedEl.textContent = m > 0 ? m + 'm ' + sec + 's' : sec + 's';
    }, 1000);

    // Poll for job result via tools/call
    function poll() {
      if (done || !jobId) return;
      window.parent.postMessage({
        jsonrpc: '2.0',
        method: 'tools/call',
        params: { toolName: 'check_openclaw_task', input: { jobId: jobId } }
      }, '*');
    }

    function handleData(data) {
      if (!data) return;

      // Initial submit — extract jobId
      if (data.jobId && !jobId) {
        jobId = data.jobId;
        sessionKey = data.sessionKey;
        startTime = Date.now();
        addLog('Task submitted: ' + jobId.slice(0, 8) + '...');
        setStatus('running');
        // Start polling
        poll();
        return;
      }

      // Poll results
      if (data.status === 'running') {
        var elapsed = data.elapsedSeconds || 0;
        addLog('Still running... (' + elapsed + 's)');
        // Poll again after server-side long poll returns
        poll();
      } else if (data.status === 'completed') {
        showResult(data.summary, 'completed');
      } else if (data.status === 'error') {
        showResult(data.error, 'error');
      }
    }

    // Listen for ALL messages from ChatGPT host
    window.addEventListener('message', function(event) {
      if (event.source !== window.parent) return;
      var msg = event.data;
      if (!msg || msg.jsonrpc !== '2.0') return;

      // Tool result notification (initial + poll results)
      if (msg.method === 'ui/notifications/tool-result') {
        var data = msg.params && msg.params.structuredContent;
        handleData(data);
        return;
      }
    }, { passive: true });

    // Check for restored state
    if (window.openai && window.openai.widgetState && window.openai.widgetState.done) {
      showResult(window.openai.widgetState.summary, window.openai.widgetState.status);
    } else {
      addLog('Waiting for Clawdy...');
    }
  </script>
</body>
</html>
