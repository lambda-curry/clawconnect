<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Task</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #e4e4e7;
      background: #18181b;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.running { background: #422006; color: #fbbf24; }
    .badge.completed { background: #052e16; color: #4ade80; }
    .badge.error { background: #450a0a; color: #f87171; }
    .badge.queued { background: #1e1b4b; color: #a78bfa; }
    .elapsed {
      font-size: 12px;
      color: #71717a;
      margin-left: auto;
    }
    .logs {
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      max-height: 100px;
      overflow-y: auto;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      color: #a1a1aa;
      line-height: 1.5;
    }
    .logs .entry { white-space: pre-wrap; word-break: break-word; }
    .logs .entry.info { color: #a1a1aa; }
    .logs .entry.done { color: #4ade80; }
    .logs .entry.err { color: #f87171; }
    .result {
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.6;
    }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #fbbf2440;
      border-top-color: #fbbf24;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span class="badge queued" id="badge">queued</span>
    <span id="spinnerWrap"><span class="spinner"></span></span>
    <span class="elapsed" id="elapsed"></span>
  </div>
  <div class="logs" id="logs"></div>
  <div class="result" id="result" style="display:none"></div>

  <script>
    var badgeEl = document.getElementById('badge');
    var spinnerEl = document.getElementById('spinnerWrap');
    var elapsedEl = document.getElementById('elapsed');
    var logsEl = document.getElementById('logs');
    var resultEl = document.getElementById('result');

    var jobId = null;
    var startTime = Date.now();
    var done = false;
    var oai = window.openai || {};

    function addLog(text, cls) {
      var el = document.createElement('div');
      el.className = 'entry ' + (cls || 'info');
      el.textContent = text;
      logsEl.appendChild(el);
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function setStatus(status) {
      badgeEl.className = 'badge ' + status;
      badgeEl.textContent = status;
      if (status === 'completed' || status === 'error') {
        spinnerEl.style.display = 'none';
        done = true;
      }
    }

    // Extract data from either {structuredContent: {…}} or flat {jobId, status, …}
    function extractData(obj) {
      if (!obj) return null;
      if (obj.structuredContent) return obj.structuredContent;
      if (obj.jobId || obj.status) return obj;
      return null;
    }

    async function showResult(summary, status) {
      done = true;
      setStatus(status === 'error' ? 'error' : 'completed');
      if (summary) {
        resultEl.style.display = 'block';
        resultEl.textContent = summary;
      }
      addLog(status === 'error' ? 'Task failed.' : 'Task completed.', status === 'error' ? 'err' : 'done');

      if (oai.setWidgetState) {
        oai.setWidgetState({ done: true, summary: summary, status: status });
      }

      // Try multiple approaches to re-awaken the chat
      if (status !== 'error' && summary) {
        try {
          if (oai.requestTargetedReply) {
            await oai.requestTargetedReply();
            addLog('Requested targeted reply');
          }
        } catch(e) { addLog('targetedReply: ' + e.message); }

        try {
          if (oai.sendFollowUpMessage) {
            await oai.sendFollowUpMessage('Clawdy finished:\n\n' + summary.slice(0, 500));
            addLog('Sent follow-up');
          }
        } catch(e) { addLog('followUp: ' + e.message); }
      }
    }

    // Elapsed timer
    setInterval(function() {
      if (done) return;
      var s = Math.round((Date.now() - startTime) / 1000);
      var m = Math.floor(s / 60);
      var sec = s % 60;
      elapsedEl.textContent = m > 0 ? m + 'm ' + sec + 's' : sec + 's';
    }, 1000);

    // Poll for job result
    async function poll() {
      if (done || !jobId) return;
      try {
        var result = await oai.callTool('check_openclaw_task', { jobId: jobId });
        var data = extractData(result);
        if (!data) {
          addLog('No data, retrying...');
          setTimeout(poll, 3000);
          return;
        }
        if (data.status === 'running') {
          addLog('Running... (' + (data.elapsedSeconds || 0) + 's)');
          poll();
        } else if (data.status === 'completed') {
          showResult(data.summary, 'completed');
        } else if (data.status === 'error') {
          showResult(data.error, 'error');
        }
      } catch (err) {
        addLog('Poll error: ' + (err.message || err), 'err');
        setTimeout(poll, 5000);
      }
    }

    function startFromOutput(output) {
      if (done || jobId) return;
      var data = extractData(output);
      if (data && data.jobId) {
        jobId = data.jobId;
        startTime = Date.now();
        addLog('Job: ' + jobId.slice(0, 8) + '...');
        setStatus('running');
        poll();
      }
    }

    // Check restored state
    if (oai.widgetState && oai.widgetState.done) {
      showResult(oai.widgetState.summary, oai.widgetState.status);
    } else {
      addLog('Waiting for response...');

      // toolOutput may already be populated
      if (oai.toolOutput) {
        startFromOutput(oai.toolOutput);
      }

      // Listen for the event when ChatGPT delivers the tool result
      window.addEventListener('openai:set_globals', function() {
        try {
          startFromOutput(window.openai.toolOutput);
        } catch(e) {
          addLog('ERR: ' + e.message, 'err');
        }
      });
    }
  </script>
</body>
</html>
