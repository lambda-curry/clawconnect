<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Task</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .widget {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      padding: 12px 14px;
      gap: 8px;
    }
    .widget-main {
      display: grid;
      min-height: 0;
      min-width: 0;
      flex: 1;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      overflow: hidden;
    }
    .response-panel,
    .activity-panel {
      min-height: 0;
      min-width: 0;
    }
    .response-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      gap: 8px;
    }
    .response-header,
    .response-footer {
      flex-shrink: 0;
      min-width: 0;
    }
    .response-body {
      min-height: 0;
      min-width: 0;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .activity-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    @media (min-width: 768px) {
      .widget-main {
        grid-template-columns: minmax(0, 1fr) 320px;
      }
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
      min-width: 0;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.starting     { background: #1e1b4b; color: #a78bfa; }
    .badge.active       { background: #422006; color: #fbbf24; }
    .badge.quiet        { background: #1c1917; color: #a8a29e; }
    .badge.stalled      { background: #451a03; color: #fb923c; }
    .badge.waiting_on_user { background: #1e1b4b; color: #c4b5fd; }
    .badge.completed    { background: #052e16; color: #4ade80; }
    .badge.completed_no_summary { background: #14532d; color: #86efac; }
    .badge.failed       { background: #450a0a; color: #f87171; }
    .badge.reconnecting { background: #1e1b4b; color: #a78bfa; }
    .badge.service_unavailable { background: #27272a; color: #71717a; }
    .meta {
      font-size: 11px; color: #52525b; margin-left: auto;
      display: flex; gap: 10px; align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 0;
    }
    .meta span { white-space: nowrap; }
    .spinner {
      display: inline-block; width: 10px; height: 10px;
      border: 1.5px solid #fbbf2440; border-top-color: #fbbf24;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Identity row ───────────────────────────────────── */
    .identity {
      display: flex; gap: 12px; font-size: 10px; color: #3f3f46;
      flex-wrap: wrap; flex-shrink: 0; min-width: 0;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .identity .label { color: #52525b; }

    /* ── Activity / Logs ────────────────────────────────── */
    .section-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: #52525b; margin-bottom: 4px;
      flex-shrink: 0;
    }
    .response-header .section-label,
    .activity-panel .section-label {
      margin-bottom: 0;
    }
    .logs {
      background: #09090b; border: 1px solid #27272a; border-radius: 6px;
      padding: 8px 10px;
      min-height: 0; max-height: none; overflow-y: auto;
      font-family: "SF Mono", "Fira Code", monospace; font-size: 10px;
      color: #71717a; line-height: 1.5;
      flex: 1;
      min-width: 0;
      overflow-x: hidden;
    }
    .logs .entry { white-space: pre-wrap; word-break: break-word; display: flex; gap: 6px; }
    .logs .ts { color: #3f3f46; flex-shrink: 0; min-width: 28px; }
    .logs .icon { flex-shrink: 0; width: 12px; text-align: center; }
    .logs .entry span:last-child { min-width: 0; overflow-wrap: anywhere; }
    .logs .entry.phase .icon { color: #a78bfa; }
    .logs .entry.tool .icon { color: #60a5fa; }
    .logs .entry.tool-result .icon { color: #4ade80; }
    .logs .entry.tool-result.error .icon { color: #f87171; }
    .logs .entry.heartbeat { color: #3f3f46; }
    .logs .entry.heartbeat .icon { color: #3f3f46; }

    /* ── Result ─────────────────────────────────────────── */
    .result-wrap {
      flex: 1; min-height: 0; min-width: 0; display: none;
      flex-direction: column;
    }
    .result-wrap.visible { display: flex; }
    .result {
      background: #09090b; border: 1px solid #27272a; border-radius: 6px;
      padding: 10px 12px; flex: 1; min-height: 0; min-width: 0;
      word-break: break-word; overflow-wrap: anywhere; font-size: 13px; line-height: 1.6;
    }
    .result h1, .result h2, .result h3 { color: #f4f4f5; margin: 10px 0 4px 0; font-size: 15px; }
    .result h1 { font-size: 17px; }
    .result h3 { font-size: 13px; }
    .result p { margin: 4px 0; }
    .result ul, .result ol { margin: 4px 0; padding-left: 18px; }
    .result li { margin: 2px 0; }
    .result code {
      background: #27272a; padding: 1px 4px; border-radius: 3px;
      font-family: "SF Mono", "Fira Code", monospace; font-size: 12px;
    }
    .result pre {
      background: #27272a; padding: 6px 8px; border-radius: 4px;
      overflow-x: auto; margin: 6px 0;
    }
    .result pre code { background: none; padding: 0; }
    .result strong { color: #f4f4f5; }
    .result a { color: #60a5fa; text-decoration: none; }
    .result a:hover { text-decoration: underline; }
    .result blockquote {
      border-left: 2px solid #3f3f46; padding-left: 8px; margin: 6px 0; color: #a1a1aa;
    }

    /* ── Fallback summary (completed_no_summary) ────────── */
    .fallback-summary {
      background: #09090b; border: 1px solid #27272a; border-radius: 6px;
      padding: 10px 12px; font-size: 12px; color: #a1a1aa; line-height: 1.5;
      display: none;
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .fallback-summary.visible { display: block; }
    .fallback-summary .note {
      color: #71717a; font-size: 11px; margin-bottom: 6px;
    }
    .fallback-summary .detail { margin: 2px 0; }
    .fallback-summary .detail .label { color: #52525b; }

    /* ── Actions ─────────────────────────────────────────── */
    .actions {
      display: none; gap: 8px; flex-wrap: wrap; flex-shrink: 0; min-width: 0;
    }
    .actions.visible { display: flex; }
    .action-btn {
      background: #27272a; color: #d4d4d8; border: 1px solid #3f3f4680;
      border-radius: 5px; padding: 5px 10px; font-size: 11px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
      max-width: 100%;
    }
    .action-btn:hover { background: #3f3f46; }
    .action-btn:disabled { opacity: 0.35; cursor: default; }
    .action-btn.primary { background: #1d4ed8; border-color: #2563eb80; color: #e4e4e7; }
    .action-btn.primary:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="widget">
    <div class="header">
      <span class="badge starting" id="badge">starting</span>
      <span id="spinnerWrap"><span class="spinner"></span></span>
      <div class="meta">
        <span id="elapsed"></span>
        <span id="lastEvent"></span>
      </div>
    </div>
    <div class="identity" id="identity"></div>
    <div class="widget-main">
      <div class="response-panel">
        <div class="response-header">
          <div class="section-label" id="resultLabel">Clawdy's response</div>
        </div>
        <div class="response-body">
          <div class="result-wrap" id="resultWrap">
            <div class="result" id="result"></div>
          </div>
          <div class="fallback-summary" id="fallback"></div>
        </div>
        <div class="response-footer">
          <div class="actions" id="actions"></div>
        </div>
      </div>
      <div class="activity-panel">
        <div class="section-label">Activity</div>
        <div class="logs" id="logs"></div>
      </div>
    </div>
  </div>

  <script>
    // ── DOM refs ──────────────────────────────────────────
    var badgeEl    = document.getElementById('badge');
    var spinnerEl  = document.getElementById('spinnerWrap');
    var elapsedEl  = document.getElementById('elapsed');
    var lastEvtEl  = document.getElementById('lastEvent');
    var identityEl = document.getElementById('identity');
    var logsEl     = document.getElementById('logs');
    var resultWrap = document.getElementById('resultWrap');
    var resultLabel= document.getElementById('resultLabel');
    var resultEl   = document.getElementById('result');
    var fallbackEl = document.getElementById('fallback');
    var actionsEl  = document.getElementById('actions');

    var oai = window.openai || {};

    // ── Constants ─────────────────────────────────────────
    var QUIET_THRESHOLD_S  = 15;
    var STALLED_THRESHOLD_S = 60;
    var POLL_CALL_TIMEOUT_MS = 65000; // Must exceed server's 50s long-poll

    // ── State ─────────────────────────────────────────────
    var state = {
      jobId: null,
      sessionKey: null,
      status: 'starting',       // UI state
      serverStatus: null,       // raw server status
      startedAt: null,
      lastEventAt: null,
      lastPollAt: null,
      summary: null,
      error: null,
      errorInfo: null,
      logs: [],
      artifacts: null,
      continuationState: null,
      seenLogCount: 0,
      pollTimer: null,
      tickTimer: null,
      pollFailures: 0,
    };

    // ── UI state labels ──────────────────────────────────
    var STATUS_LABELS = {
      starting: 'Starting',
      active: 'Active',
      quiet: 'Quiet',
      stalled: 'Stalled',
      waiting_on_user: 'Waiting on you',
      completed: 'Completed',
      completed_no_summary: 'Done (no summary)',
      failed: 'Failed',
      reconnecting: 'Reconnecting',
      service_unavailable: 'Unavailable',
    };

    // ── Persistence (widget-instance scoped) ─────────────
    // Note: ChatGPT does not expose a stable chat/thread ID to widgets.
    // We use oai.setWidgetState / oai.widgetState which is scoped to
    // the widget instance within the current message, not globally.
    // This means: on refresh within the same chat, the widget can restore
    // from its own prior state. It will NOT cross-pollinate between chats.

    function persistState() {
      if (!oai.setWidgetState) return;
      oai.setWidgetState({
        jobId: state.jobId,
        sessionKey: state.sessionKey,
        serverStatus: state.serverStatus,
        startedAt: state.startedAt,
        lastEventAt: state.lastEventAt,
        lastPollAt: state.lastPollAt,
        summary: state.summary,
        error: state.error,
        errorInfo: state.errorInfo,
        logs: state.logs,
        artifacts: state.artifacts,
        continuationState: state.continuationState,
      });
    }

    function restoreFromWidgetState(ws) {
      if (!ws || (!ws.jobId && !ws.sessionKey)) return false;
      state.jobId = ws.jobId;
      state.sessionKey = ws.sessionKey;
      state.serverStatus = ws.serverStatus;
      state.startedAt = ws.startedAt;
      state.lastEventAt = ws.lastEventAt;
      state.lastPollAt = ws.lastPollAt;
      state.summary = ws.summary;
      state.error = ws.error;
      state.errorInfo = ws.errorInfo;
      state.logs = ws.logs || [];
      state.artifacts = ws.artifacts;
      state.continuationState = ws.continuationState;
      state.seenLogCount = state.logs.length;
      return true;
    }

    function isTerminalServerStatus(status) {
      return status === 'completed' || status === 'completed_no_summary' || status === 'error';
    }

    function snapshotTs(snapshot) {
      if (!snapshot) return 0;
      return snapshot.lastEventAt || snapshot.startedAt || 0;
    }

    function currentSnapshot() {
      return {
        jobId: state.jobId,
        sessionKey: state.sessionKey,
        status: state.serverStatus,
        startedAt: state.startedAt,
        lastEventAt: state.lastEventAt,
        summary: state.summary,
        error: state.error,
        errorInfo: state.errorInfo,
        logs: state.logs,
        artifacts: state.artifacts,
        continuationState: state.continuationState,
      };
    }

    function shouldPreferSnapshot(next, current) {
      if (!next || (!next.jobId && !next.sessionKey)) return false;
      if (!current || (!current.jobId && !current.sessionKey)) return true;

      var nextTerminal = isTerminalServerStatus(next.status);
      var currentTerminal = isTerminalServerStatus(current.status);
      if (nextTerminal !== currentTerminal) return nextTerminal;

      return snapshotTs(next) >= snapshotTs(current);
    }

    function applySnapshot(data, opts) {
      if (!data || (!data.jobId && !data.sessionKey)) return false;
      var renderLogs = !opts || opts.renderLogs !== false;

      if (Object.prototype.hasOwnProperty.call(data, 'jobId')) state.jobId = data.jobId;
      if (Object.prototype.hasOwnProperty.call(data, 'sessionKey')) state.sessionKey = data.sessionKey;
      if (Object.prototype.hasOwnProperty.call(data, 'status')) state.serverStatus = data.status;
      if (Object.prototype.hasOwnProperty.call(data, 'startedAt') && data.startedAt) state.startedAt = data.startedAt;
      if (Object.prototype.hasOwnProperty.call(data, 'lastEventAt') && data.lastEventAt) state.lastEventAt = data.lastEventAt;
      state.lastPollAt = Date.now();
      if (Object.prototype.hasOwnProperty.call(data, 'summary')) state.summary = data.summary;
      if (Object.prototype.hasOwnProperty.call(data, 'error')) state.error = data.error;
      if (Object.prototype.hasOwnProperty.call(data, 'errorInfo')) state.errorInfo = data.errorInfo;
      if (Object.prototype.hasOwnProperty.call(data, 'artifacts')) state.artifacts = data.artifacts;
      if (Object.prototype.hasOwnProperty.call(data, 'continuationState')) state.continuationState = data.continuationState;
      if (Object.prototype.hasOwnProperty.call(data, 'logs') && data.logs) {
        state.logs = data.logs;
        state.seenLogCount = data.logs.length;
        if (renderLogs) renderAllLogs();
      }
      state.pollFailures = 0;
      return true;
    }

    function reconcileSnapshot(data, opts) {
      if (!shouldPreferSnapshot(data, currentSnapshot())) return false;
      return applySnapshot(data, opts);
    }

    // ── Derived UI state ─────────────────────────────────
    // The server sends: running | completed | completed_no_summary | error
    // The widget derives richer states from timestamps.

    function deriveUiStatus() {
      var ss = state.serverStatus;
      if (!ss) return 'starting';
      if (ss === 'completed') return 'completed';
      if (ss === 'completed_no_summary') return 'completed_no_summary';
      if (ss === 'error') return 'failed';
      // ss === 'running'
      if (state.artifacts && state.artifacts.needsHumanDecision) return 'waiting_on_user';
      if (state.pollFailures >= 5) return 'service_unavailable';
      if (state.pollFailures > 0) return 'reconnecting';
      var now = Date.now();
      var ref = state.lastEventAt || state.startedAt;
      var sinceLast = ref ? (now - ref) / 1000 : 999;
      if (sinceLast > STALLED_THRESHOLD_S) return 'stalled';
      if (sinceLast > QUIET_THRESHOLD_S) return 'quiet';
      return 'active';
    }

    function isTerminal(s) {
      return s === 'completed' || s === 'completed_no_summary' || s === 'failed';
    }

    // ── Markdown renderer ────────────────────────────────
    function escapeHtml(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function resetUi() {
      logsEl.innerHTML = '';
      detailsWrapEl.style.display = 'none';
      detailsLabelEl.textContent = 'Outcome';
      detailsEl.innerHTML = '';
      resultLabel.style.display = 'none';
      resultLabel.textContent = "Clawdy's response";
      resultEl.style.display = 'none';
      resultEl.innerHTML = '';
      actionsEl.style.display = 'none';
      actionsEl.innerHTML = '';
      seenLogCount = 0;
      done = false;
      setStatus('queued');
      elapsedEl.textContent = '';
    }

    function renderMarkdown(text) {
      var html = escapeHtml(text);
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
        return '<pre><code>' + code.trim() + '</code></pre>';
      });
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br>');
      return '<p>' + html + '</p>';
    }

    // ── Log normalization / dedup ────────────────────────
    // Maps raw gateway events to human-meaningful phases.
    // Dedupes repeated lifecycle noise.

    var PHASE_MAP = {
      'Agent started': 'Starting up',
      'Agent finished': 'Wrapping up',
    };

    var TOOL_PHASES = {
      'Read': 'Reading files',
      'Glob': 'Searching files',
      'Grep': 'Searching code',
      'Edit': 'Editing files',
      'Write': 'Writing files',
      'Bash': 'Running command',
      'exec': 'Running command',
      'Agent': 'Delegating subtask',
      'WebFetch': 'Fetching web content',
      'WebSearch': 'Searching the web',
    };

    function normalizeLogEntry(entry) {
      if (entry.type === 'lifecycle') {
        var mapped = PHASE_MAP[entry.text];
        return { type: 'phase', text: mapped || entry.text, raw: entry };
      }
      if (entry.type === 'tool') {
        var toolName = entry.text.split(':')[0];
        var detail = entry.text.slice(toolName.length + 1).trim();
        var phase = TOOL_PHASES[toolName];
        if (phase) {
          return { type: 'tool', text: phase + (detail ? ' \u2014 ' + detail : ''), toolName: toolName, raw: entry };
        }
        return { type: 'tool', text: entry.text, toolName: toolName, raw: entry };
      }
      if (entry.type === 'tool-result') {
        var isErr = entry.text.indexOf('failed') >= 0;
        return { type: 'tool-result', text: entry.text, isError: isErr, raw: entry };
      }
      return { type: entry.type, text: entry.text, raw: entry };
    }

    function shouldDedup(prev, curr) {
      if (!prev) return false;
      // Collapse repeated identical phase entries
      if (prev.type === 'phase' && curr.type === 'phase' && prev.text === curr.text) return true;
      // Collapse repeated reads of different files into just the latest
      if (prev.type === 'tool' && curr.type === 'tool' &&
          prev.text.indexOf('Reading files') === 0 && curr.text.indexOf('Reading files') === 0) return true;
      // Collapse heartbeat updates (replace with latest timing)
      if (prev.type === 'heartbeat' && curr.type === 'heartbeat') return true;
      return false;
    }

    // ── Render helpers ───────────────────────────────────
    var ICONS = { phase: '\u25B6', tool: '\u2692', 'tool-result': '\u2714', heartbeat: '\u00B7' };

    function renderLogEntry(normalized, elapsedS) {
      var el = document.createElement('div');
      var cls = 'entry ' + normalized.type;
      if (normalized.isError) cls += ' error';
      el.className = cls;
      var icon = ICONS[normalized.type] || '\u2022';
      if (normalized.type === 'tool-result' && normalized.isError) icon = '\u2718';
      el.innerHTML = '<span class="ts">' + elapsedS + 's</span>'
        + '<span class="icon">' + icon + '</span>'
        + '<span>' + escapeHtml(normalized.text) + '</span>';
      return el;
    }

    function renderAllLogs() {
      logsEl.innerHTML = '';
      var prev = null;
      for (var i = 0; i < state.logs.length; i++) {
        var norm = normalizeLogEntry(state.logs[i]);
        if (shouldDedup(prev, norm)) {
          if (logsEl.lastChild) logsEl.removeChild(logsEl.lastChild);
        }
        var elapsed = Math.round((state.logs[i].ts - (state.startedAt || state.logs[i].ts)) / 1000);
        var el = renderLogEntry(norm, elapsed);
        el._normalized = norm;
        logsEl.appendChild(el);
        prev = norm;
      }
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function renderIncrementalLogs(newLogs) {
      for (var i = 0; i < newLogs.length; i++) {
        var norm = normalizeLogEntry(newLogs[i]);
        // Check dedup against last rendered
        var lastChild = logsEl.lastChild;
        if (lastChild && lastChild._normalized && shouldDedup(lastChild._normalized, norm)) {
          logsEl.removeChild(lastChild);
        }
        var elapsed = Math.round((newLogs[i].ts - (state.startedAt || newLogs[i].ts)) / 1000);
        var el = renderLogEntry(norm, elapsed);
        el._normalized = norm;
        logsEl.appendChild(el);
      }
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function renderIdentity() {
      if (!state.jobId) { identityEl.innerHTML = ''; return; }
      var jobShort = state.jobId.slice(0, 8);
      var sessShort = state.sessionKey ? state.sessionKey.slice(-8) : '?';
      identityEl.innerHTML =
        '<span><span class="label">job</span> ' + jobShort + '</span>' +
        '<span><span class="label">session</span> ' + sessShort + '</span>';
    }

    function fmtAgo(ts) {
      if (!ts) return '';
      var s = Math.round((Date.now() - ts) / 1000);
      if (s < 5) return 'just now';
      if (s < 60) return s + 's ago';
      var m = Math.floor(s / 60);
      return m + 'm ' + (s % 60) + 's ago';
    }

    function fmtElapsed() {
      if (!state.startedAt) return '';
      var s = Math.round((Date.now() - state.startedAt) / 1000);
      var m = Math.floor(s / 60);
      return m > 0 ? m + 'm ' + (s % 60) + 's' : s + 's';
    }

    function updateStatus() {
      var uiStatus = deriveUiStatus();
      state.status = uiStatus;
      badgeEl.className = 'badge ' + uiStatus;
      badgeEl.textContent = STATUS_LABELS[uiStatus] || uiStatus;
      spinnerEl.style.display = (uiStatus === 'active' || uiStatus === 'starting' || uiStatus === 'reconnecting') ? '' : 'none';
    }

    function updateMeta() {
      elapsedEl.textContent = fmtElapsed();
      if (!isTerminal(state.status) && state.serverStatus === 'running') {
        var parts = [];
        if (state.lastEventAt) parts.push('event ' + fmtAgo(state.lastEventAt));
        if (state.lastPollAt) parts.push('poll ' + fmtAgo(state.lastPollAt));
        lastEvtEl.textContent = parts.join(' \u00B7 ');
      } else {
        lastEvtEl.textContent = '';
      }
    }

    // ── Fallback summary for completed_no_summary ────────
    function buildFallbackSummary() {
      var a = state.artifacts;
      if (!a) return null;
      var parts = [];
      if (a.filesChanged && a.filesChanged.length > 0) {
        parts.push(a.filesChanged.length + ' file(s) modified: ' + a.filesChanged.slice(0, 5).map(function(f) {
          return f.split('/').pop();
        }).join(', ') + (a.filesChanged.length > 5 ? '...' : ''));
      }
      if (a.commandsRun && a.commandsRun.length > 0) {
        parts.push(a.commandsRun.length + ' command(s) run');
      }
      if (a.prUrl) parts.push('PR: ' + a.prUrl);
      if (a.branchName) parts.push('Branch: ' + a.branchName);
      if (a.commitSha) parts.push('Commit: ' + a.commitSha.slice(0, 7));
      return parts.length > 0 ? parts : null;
    }

    function renderFallback() {
      var parts = buildFallbackSummary();
      if (!parts) {
        fallbackEl.className = 'fallback-summary';
        fallbackEl.innerHTML = '<div class="note">Task completed but no assistant summary was received.</div>'
          + '<div class="detail">Check the activity log above for details.</div>';
        fallbackEl.className = 'fallback-summary visible';
        return;
      }
      var html = '<div class="note">Task completed but no assistant summary was received. Here\'s what we know:</div>';
      parts.forEach(function(p) {
        html += '<div class="detail">' + escapeHtml(p) + '</div>';
      });
      fallbackEl.innerHTML = html;
      fallbackEl.className = 'fallback-summary visible';
    }

    // ── Result rendering ─────────────────────────────────
    function renderResult() {
      var uiStatus = state.status;

      if (uiStatus === 'failed') {
        resultLabel.textContent = 'Error';
        resultEl.innerHTML = renderMarkdown(state.error || 'Unknown error');
        resultWrap.className = 'result-wrap visible';
        fallbackEl.className = 'fallback-summary';
        return;
      }

      if (uiStatus === 'completed_no_summary') {
        resultWrap.className = 'result-wrap';
        renderFallback();
        return;
      }

      if (uiStatus === 'completed' && state.summary) {
        resultLabel.textContent = "Clawdy's response";
        resultEl.innerHTML = renderMarkdown(state.summary);
        resultWrap.className = 'result-wrap visible';
        fallbackEl.className = 'fallback-summary';
        return;
      }

      // Not terminal or no content yet
      resultWrap.className = 'result-wrap';
      fallbackEl.className = 'fallback-summary';
    }

    // ── Action buttons ───────────────────────────────────
    function buildDirective(data) {
      var s = data.status || state.serverStatus;
      if (s === 'error') {
        var ei = data.errorInfo || state.errorInfo;
        if (ei) return 'Clawdy encountered a ' + ei.category + ' error. ' + ei.suggestedRecovery + ' Explain what happened and suggest how to fix it.';
        return 'Clawdy encountered an error. Explain what went wrong and suggest recovery steps.';
      }
      var a = data.artifacts || state.artifacts || {};
      if (a.prUrl) return 'Clawdy created a PR at ' + a.prUrl + '. Summarize the changes and ask if the user wants to review or merge.';
      if (a.needsHumanDecision) return 'Clawdy needs a decision from the user. Present the options clearly.';
      if ((a.filesChanged || []).length > 0) return 'Clawdy modified ' + a.filesChanged.length + ' file(s). Summarize what changed and propose next steps.';
      if (s === 'completed_no_summary') return 'Clawdy completed the task but no summary was received. Describe what we know from artifacts and ask how to proceed.';
      return 'Clawdy completed the task. Summarize the result and propose next steps.';
    }

    function renderActions() {
      var uiStatus = state.status;
      var sk = state.sessionKey;
      var a = state.artifacts || {};
      var buttons = [];

      if (uiStatus === 'stalled' || uiStatus === 'quiet' || uiStatus === 'service_unavailable') {
        buttons.push({
          label: 'Check in',
          msg: 'The Clawdy widget has not received events for a while. Use the check_openclaw_task tool with sessionKey "' + sk + '" to get the latest status, then report what you find.',
          primary: true,
        });
      } else if (!isTerminal(uiStatus)) {
        actionsEl.className = 'actions';
        return;
      }

      if (isTerminal(uiStatus)) {
        if (uiStatus === 'failed') {
          buttons.push({ label: 'Retry', msg: 'Retry the failed task using sessionKey: ' + sk, primary: true });
          buttons.push({ label: 'Explain error', msg: 'Explain in detail what went wrong and why.' });
        } else if (uiStatus === 'completed_no_summary') {
          buttons.push({ label: 'Continue session', msg: 'Continue working on this using sessionKey: ' + sk, primary: true });
          buttons.push({ label: 'Reconstruct summary', msg: 'Ask Clawdy to summarize what it did using sessionKey: ' + sk });
          buttons.push({ label: 'Show raw events', msg: 'Show the raw activity log from the last task.' });
        } else {
          // completed
          buttons.push({ label: 'Continue session', msg: 'Continue working on this using sessionKey: ' + sk, primary: true });
          buttons.push({ label: 'Explain changes', msg: 'Explain the changes Clawdy made in detail.' });
          if (!a.prUrl && (a.filesChanged || []).length > 0) {
            buttons.push({ label: 'Create PR', msg: 'Ask Clawdy to create a PR for these changes using sessionKey: ' + sk });
          }
        }

        // Always offer "Start new task" when terminal
        buttons.push({ label: 'New task', msg: 'Start a fresh task with Clawdy (new session).' });
      }

      actionsEl.className = 'actions visible';
      actionsEl.innerHTML = '';
      buttons.forEach(function(b) {
        var btn = document.createElement('button');
        btn.className = 'action-btn' + (b.primary ? ' primary' : '');
        btn.textContent = b.label;
        btn.onclick = function() {
          btn.disabled = true;
          var api = window.openai || {};
          if (api.sendFollowUpMessage) {
            api.sendFollowUpMessage({ prompt: b.msg });
          }
        };
        actionsEl.appendChild(btn);
      });
    }

    // ── Full render ──────────────────────────────────────
    function render() {
      updateStatus();
      updateMeta();
      renderIdentity();
      renderResult();
      renderActions();
    }

    // ── Polling ──────────────────────────────────────────
    function callToolWithTimeout(name, args, timeoutMs) {
      return new Promise(function (resolve, reject) {
        var settled = false;
        var timer = setTimeout(function () {
          if (!settled) { settled = true; reject(new Error('Tool call timed out')); }
        }, timeoutMs);
        oai.callTool(name, args).then(
          function (v) { if (!settled) { settled = true; clearTimeout(timer); resolve(v); } },
          function (e) { if (!settled) { settled = true; clearTimeout(timer); reject(e); } }
        );
      });
    }

    async function poll() {
      if (isTerminal(deriveUiStatus()) || (!state.jobId && !state.sessionKey) || !oai.callTool) return;
      try {
        var prevJobId = state.jobId;
        var result = await callToolWithTimeout('check_openclaw_task', {
          jobId: state.jobId,
          sessionKey: state.sessionKey,
          knownLogCount: state.seenLogCount,
        }, POLL_CALL_TIMEOUT_MS);
        var data = extractSnapshot(result);
        if (!data) { schedulePoll(3000); return; }

        var prevSeenLogCount = state.seenLogCount;
        var prevLogsLength = state.logs.length;
        var adopted = reconcileSnapshot(data, { renderLogs: false });

        if (adopted) {
          if (data.logs && data.jobId !== prevJobId) {
            renderAllLogs();
          } else if (data.logs && data.logs.length > prevSeenLogCount && prevLogsLength > 0) {
            var newLogs = data.logs.slice(prevSeenLogCount);
            renderIncrementalLogs(newLogs);
          } else if (data.logs && data.logs.length !== prevLogsLength) {
            renderAllLogs();
          }
        }

        render();
        persistState();

        if (state.serverStatus === 'running') {
          schedulePoll(0);
        } else {
          onTerminal();
        }
      } catch (err) {
        state.pollFailures++;
        state.lastPollAt = Date.now();
        render();
        persistState();
        schedulePoll(Math.min(5000 * state.pollFailures, 30000));
      }
    }

    function schedulePoll(delayMs) {
      clearTimeout(state.pollTimer);
      state.pollTimer = setTimeout(poll, delayMs);
    }

    function onTerminal() {
      persistState();
      // sendFollowUpMessage requires a synchronous user gesture (click/tap).
      // There is no documented way to programmatically wake ChatGPT from a
      // widget without user interaction. The action buttons handle follow-ups.
      // See: https://community.openai.com/t/support-for-asynchronous-replies-with-apps-sdk/1363373
    }

    // ── Data extraction ──────────────────────────────────
    function extractSnapshot(obj) {
      if (!obj) return null;
      if (obj.structuredContent) return obj.structuredContent;
      if (obj.jobId || obj.sessionKey || obj.status) return obj;
      return null;
    }

    function maybeReconnect() {
      if (!oai.callTool) return false;
      if (isTerminal(deriveUiStatus()) || (!state.jobId && !state.sessionKey)) return false;
      state.status = 'reconnecting';
      render();
      schedulePoll(0);
      return true;
    }

    function reconcileFromOutput(output) {
      var data = extractSnapshot(output);
      if (!data) return false;
      var adopted = reconcileSnapshot(data, { renderLogs: true });
      if (!adopted) return false;
      render();
      persistState();
      if (isTerminalServerStatus(state.serverStatus)) {
        onTerminal();
      } else {
        maybeReconnect();
      }
      return true;
    }

    // ── Tick (updates elapsed + derived status + heartbeat) ──
    var lastHeartbeatStatus = null;

    function tick() {
      if (isTerminal(state.status)) return;
      var prev = state.status;
      updateStatus();
      updateMeta();

      // Inject heartbeat entries when crossing quiet/stalled thresholds
      var cur = state.status;
      if (cur !== lastHeartbeatStatus && (cur === 'quiet' || cur === 'stalled')) {
        var hbRef = state.lastEventAt || state.startedAt;
        var sinceLast = hbRef ? Math.round((Date.now() - hbRef) / 1000) : 0;
        var hbText = cur === 'stalled'
          ? 'No fresh events for ' + sinceLast + 's \u2014 task may be working on something complex'
          : 'No fresh events for ' + sinceLast + 's \u2014 polling healthy';
        var hbEntry = { ts: Date.now(), type: 'heartbeat', text: hbText };
        state.logs.push(hbEntry);
        renderIncrementalLogs([hbEntry]);
        lastHeartbeatStatus = cur;
      } else if (cur === 'active') {
        lastHeartbeatStatus = null;
      }
    }

    // ── Init: start from tool output ─────────────────────
    function startFromOutput(output) {
      var data = extractSnapshot(output);
      if (!data) return;
      if (!reconcileSnapshot(data, { renderLogs: true })) return;
      render();
      persistState();
      if (state.serverStatus === 'running') {
        maybeReconnect();
      } else {
        onTerminal();
      }
    }

    // ── Init: rehydrate from widget state ────────────────
    function rehydrate() {
      if (!oai.widgetState) return false;
      var restored = restoreFromWidgetState(oai.widgetState);
      if (!restored) return false;

      // Render restored state immediately
      renderAllLogs();
      render();

      if (isTerminal(deriveUiStatus())) {
        // Already done, just show it
        return true;
      }

      // Still running — try to reconnect
      maybeReconnect();
      return true;
    }

    // ── Boot ─────────────────────────────────────────────
    function handleGlobalsReady() {
      oai = window.openai || {};
      if (reconcileFromOutput(oai.toolOutput)) return;
      maybeReconnect();
    }

    state.tickTimer = setInterval(tick, 1000);
    window.addEventListener('openai:set_globals', handleGlobalsReady);

    if (!rehydrate()) {
      startFromOutput(oai.toolOutput);
    } else {
      reconcileFromOutput(oai.toolOutput);
    }
  </script>
</body>
</html>
